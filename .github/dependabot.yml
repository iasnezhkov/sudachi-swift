version: 2
updates:
  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]

  # Rust wrapper dependencies (thiserror, parking_lot). The sudachi.rs
  # submodule is pinned deliberately and is not managed by Dependabot.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies]
    ignore:
      # uniffi must never be bumped via a manifest-only PR: the committed
      # Sudachi.swift is generated by the pinned uniffi version, and a lone
      # Cargo bump desyncs scaffolding vs. bindings (UniFFI checksum mismatch
      # at runtime). Upgrade manually: bump, run scripts/build-ios.sh, commit
      # the regenerated bindings.
      - dependency-name: uniffi
